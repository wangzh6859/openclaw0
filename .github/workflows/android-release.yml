name: Android Release APK

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 2026.5.1), skip to auto-detect from latest tag"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: android-release
  cancel-in-progress: false

env:
  JAVA_VERSION: "21"

jobs:
  android-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')"
          fi
          VERSION="${VERSION:-0.0.0}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          DATE_CODE="$(date -u +%Y%m%d)99"
          if [ -n "$MAJOR" ] && [ -n "$MINOR" ]; then
            VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + ${PATCH:-0}))
            VERSION_CODE=$((VERSION_CODE * 100 + $(date -u +%d) % 100))
          else
            VERSION_CODE="$DATE_CODE"
          fi
          echo "version_name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "full_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected: version_name=$VERSION, version_code=$VERSION_CODE"

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.OPENCLAW_ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ERROR: OPENCLAW_ANDROID_KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > openclaw-release.p12
          ls -lh openclaw-release.p12

      - name: Configure Gradle properties
        env:
          KEYSTORE_PASS: ${{ secrets.OPENCLAW_ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: openclaw
          KEY_PASS: ${{ secrets.OPENCLAW_ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<EOF
          OPENCLAW_ANDROID_STORE_FILE=openclaw-release.p12
          OPENCLAW_ANDROID_STORE_PASSWORD=$KEYSTORE_PASS
          OPENCLAW_ANDROID_KEY_ALIAS=$KEY_ALIAS
          OPENCLAW_ANDROID_KEY_PASSWORD=$KEY_PASS
          EOF

      - name: Patch version into build.gradle.kts
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        working-directory: apps/android
        run: |
          sed -i \
            -e "s/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*\"[^\"]*\"/versionName = \"${VERSION_NAME}\"/" \
            -e "s/^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*[0-9]\+/versionCode = ${VERSION_CODE}/" \
            app/build.gradle.kts
          grep -E "versionName|versionCode" app/build.gradle.kts

      - name: Build Play release APK
        working-directory: apps/android
        run: ./gradlew :app:assemblePlayRelease --no-daemon -q 2>&1

      - name: Build Third-Party release APK
        working-directory: apps/android
        run: ./gradlew :app:assembleThirdPartyRelease --no-daemon -q 2>&1

      - name: List built APKs
        working-directory: apps/android
        run: find . -name "*.apk" -type f -exec ls -lh {} \;

      - name: Create GitHub Release & upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: "OpenClaw ${{ steps.version.outputs.tag_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            apps/android/app/build/outputs/apk/play/release/openclaw-*.apk
            apps/android/app/build/outputs/apk/thirdParty/release/openclaw-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
